<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в районе</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
            font-size: 13px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            gap: 10px;
        }
        
        header {
            text-align: center;
            padding: 5px 0;
            flex-shrink: 0;
        }
        
        h1 {
            font-size: 1.4rem;
            margin-bottom: 3px;
        }
        
        .location-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
        }
        
        .accuracy-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 5px 0;
            flex-wrap: wrap;
        }
        
        .accuracy-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .accuracy-good {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        .accuracy-medium {
            background: rgba(255, 152, 0, 0.3);
            border: 1px solid rgba(255, 152, 0, 0.5);
        }
        
        .accuracy-low {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }
        
        .current-weather-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .card {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
        }
        
        .card h2 {
            margin-bottom: 8px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .chart-card {
            flex: 1;
            min-height: 0;
        }
        
        .precipitation-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        
        .precipitation-item {
            text-align: center;
        }
        
        .precipitation-value {
            font-size: 1.4rem;
            font-weight: bold;
        }
        
        .precipitation-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        @media (max-width: 480px) {
            body {
                font-size: 12px;
            }
            
            h1 {
                font-size: 1.2rem;
            }
            
            .location-name {
                font-size: 1rem;
            }
            
            .accuracy-info {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
            
            .accuracy-item {
                width: 100%;
                justify-content: center;
            }
            
            .precipitation-info {
                flex-direction: column;
                gap: 8px;
            }
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1rem;
        }
        
        .error {
            background-color: rgba(255, 0, 0, 0.2);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
            grid-column: 1 / -1;
            font-size: 0.9rem;
        }
        
        .chart-container {
            position: relative;
            height: 100%;
            min-height: 200px;
        }
        
        .last-updated {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 3px;
        }
        
        .current-weather {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        
        .temperature {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 3px 0;
        }
        
        .weather-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .refresh-info {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 2px;
        }
        
        .accuracy-icon {
            font-size: 1.1rem;
        }
        
        .location-cache-info {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 2px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Погода в районе</h1>
            <div class="location-name" id="location-name">Определение местоположения...</div>
            <div class="accuracy-info" id="accuracy-info" style="display: none;">
                <div class="accuracy-item" id="accuracy-value">
                    <span class="accuracy-icon">🎯</span>
                    <span>Точность: <span id="accuracy-meters">0</span> м</span>
                </div>
                <div class="accuracy-item" id="accuracy-type">
                    <span class="accuracy-icon">📡</span>
                    <span>Метод: <span id="location-method">определяется</span></span>
                </div>
            </div>
            <div class="location-cache-info" id="location-cache-info"></div>
        </header>
        
        <div class="loading" id="loading">
            Определяем ваше местоположение...
        </div>
        
        <div class="error" id="error"></div>
        
        <div id="weather-data" style="display: none;">
            <div class="current-weather-row">
                <div class="card">
                    <h2>🌡️ Текущая температура</h2>
                    <div class="current-weather">
                        <div class="temperature" id="current-temp">0°C</div>
                        <div class="weather-desc" id="current-desc">Обновление...</div>
                    </div>
                </div>
            </div>
            
            <div class="card chart-card">
                <h2>📈 Температура и осадки - 10 часов назад → 10 часов вперед</h2>
                <div class="chart-container">
                    <canvas id="temperature-chart"></canvas>
                </div>
                <div class="precipitation-info" id="precipitation-info">
                    <div class="precipitation-item">
                        <div class="precipitation-value" id="precipitation-value">0%</div>
                        <div class="precipitation-desc">Вероятность осадков</div>
                    </div>
                    <div class="precipitation-item">
                        <div class="precipitation-desc" id="precipitation-desc">Небольшой дождь</div>
                    </div>
                </div>
            </div>
            
            <div class="last-updated" id="last-updated"></div>
            <div class="refresh-info" id="refresh-info">Автообновление каждые 10 минут</div>
        </div>
    </div>

    <script>
        // Элементы DOM
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('error');
        const weatherDataElement = document.getElementById('weather-data');
        const locationNameElement = document.getElementById('location-name');
        const accuracyInfoElement = document.getElementById('accuracy-info');
        const accuracyMetersElement = document.getElementById('accuracy-meters');
        const locationMethodElement = document.getElementById('location-method');
        const accuracyValueElement = document.getElementById('accuracy-value');
        const locationCacheInfoElement = document.getElementById('location-cache-info');
        const currentTempElement = document.getElementById('current-temp');
        const currentDescElement = document.getElementById('current-desc');
        const precipitationValueElement = document.getElementById('precipitation-value');
        const precipitationDescElement = document.getElementById('precipitation-desc');
        const lastUpdatedElement = document.getElementById('last-updated');
        const refreshInfoElement = document.getElementById('refresh-info');
        
        // Переменные для хранения данных
        let userLatitude = null;
        let userLongitude = null;
        let locationAccuracy = null;
        let temperatureChart = null;
        let refreshInterval = null;
        let currentTimeIndex = null;
        let isUsingCachedLocation = false;
        
        // Ключи для localStorage
        const LOCATION_CACHE_KEY = 'weatherLocationCache';
        const LOCATION_CACHE_TIME_KEY = 'weatherLocationCacheTime';
        
        // Функция для кеширования местоположения
        function cacheLocation(latitude, longitude, accuracy) {
            const cacheData = {
                latitude: latitude,
                longitude: longitude,
                accuracy: accuracy,
                timestamp: Date.now()
            };
            localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify(cacheData));
        }
        
        // Функция для получения кешированного местоположения
        function getCachedLocation() {
            const cachedData = localStorage.getItem(LOCATION_CACHE_KEY);
            if (!cachedData) return null;
            
            const locationData = JSON.parse(cachedData);
            const cacheAge = Date.now() - locationData.timestamp;
            
            // Используем кеш, если ему меньше 2 часов
            if (cacheAge < 2 * 60 * 60 * 1000) {
                return locationData;
            }
            
            return null;
        }
        
        // Функция для определения метода локации по точности
        function getLocationMethod(accuracy) {
            if (accuracy <= 20) return 'GPS (высокая точность)';
            if (accuracy <= 100) return 'Wi-Fi/сети (средняя точность)';
            return 'IP-адрес (низкая точность)';
        }
        
        // Функция для определения класса точности
        function getAccuracyClass(accuracy) {
            if (accuracy <= 20) return 'accuracy-good';
            if (accuracy <= 100) return 'accuracy-medium';
            return 'accuracy-low';
        }
        
        // Функция для обновления отображения точности
        function updateAccuracyDisplay(accuracy) {
            accuracyMetersElement.textContent = accuracy.toFixed(0);
            locationMethodElement.textContent = getLocationMethod(accuracy);
            accuracyValueElement.className = 'accuracy-item ' + getAccuracyClass(accuracy);
            accuracyInfoElement.style.display = 'flex';
            
            // Показываем информацию об использовании кеша
            if (isUsingCachedLocation) {
                locationCacheInfoElement.textContent = 'Используются кешированные координаты';
            } else {
                locationCacheInfoElement.textContent = '';
            }
        }
        
        // Функция для получения названия населенного пункта по координатам
        async function getLocationName(latitude, longitude) {
            try {
                // Добавлен параметр email согласно требованиям Nominatim
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10&addressdetails=1&email=aachist@gmail.com`;
                const response = await fetch(url, {
                    headers: {
                        'Accept-Language': 'ru-RU,ru;q=0.9,en;q=0.8'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка при получении названия местоположения');
                }
                
                const data = await response.json();
                
                // Пытаемся получить наиболее подходящее название
                let locationName = 'Неизвестное местоположение';
                
                if (data.address) {
                    if (data.address.city) locationName = data.address.city;
                    else if (data.address.town) locationName = data.address.town;
                    else if (data.address.village) locationName = data.address.village;
                    else if (data.address.hamlet) locationName = data.address.hamlet;
                    else if (data.address.suburb) locationName = data.address.suburb;
                    else if (data.address.county) locationName = data.address.county;
                    else if (data.address.state) locationName = data.address.state;
                    else if (data.address.country) locationName = data.address.country;
                }
                
                return locationName;
            } catch (error) {
                console.error('Ошибка при получении названия местоположения:', error);
                return 'Местоположение';
            }
        }
        
        // Функция для отображения ошибки
        function showError(message) {
            loadingElement.style.display = 'none';
            errorElement.style.display = 'block';
            errorElement.textContent = message;
            
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }
        
        // Функция для получения местоположения пользователя
        function getUserLocation(useCache = true) {
            return new Promise((resolve, reject) => {
                // Сначала проверяем кеш, если разрешено
                if (useCache) {
                    const cachedLocation = getCachedLocation();
                    if (cachedLocation) {
                        isUsingCachedLocation = true;
                        resolve(cachedLocation);
                        return;
                    }
                }
                
                if (!navigator.geolocation) {
                    reject('Геолокация не поддерживается вашим браузером');
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const locationData = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            timestamp: Date.now()
                        };
                        
                        // Кешируем полученные данные
                        cacheLocation(
                            locationData.latitude, 
                            locationData.longitude, 
                            locationData.accuracy
                        );
                        
                        isUsingCachedLocation = false;
                        resolve(locationData);
                    },
                    error => {
                        // Если не удалось получить геолокацию, пробуем использовать кеш
                        if (useCache) {
                            const cachedLocation = getCachedLocation();
                            if (cachedLocation) {
                                isUsingCachedLocation = true;
                                resolve(cachedLocation);
                                return;
                            }
                        }
                        
                        let errorMessage;
                        
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = 'Доступ к геолокации запрещен. Разрешите доступ к геолокации в настройках браузера.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = 'Информация о местоположении недоступна.';
                                break;
                            case error.TIMEOUT:
                                errorMessage = 'Время запроса местоположения истекло.';
                                break;
                            default:
                                errorMessage = 'Произошла неизвестная ошибка.';
                        }
                        
                        reject(errorMessage);
                    },
                    { 
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000 // 5 минут - использовать кешированные данные не старше 5 минут
                    }
                );
            });
        }
        
        // Функция для получения данных о погоде
        async function fetchWeatherData(latitude, longitude) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=temperature_2m,precipitation_probability,rain,showers&timezone=auto&forecast_days=2`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                throw new Error(`Не удалось получить данные о погоде: ${error.message}`);
            }
        }
        
        // Функция для отображения данных о погоде
        async function displayWeatherData(weatherData) {
            // Обновляем информацию о точности
            updateAccuracyDisplay(locationAccuracy);
            
            // Получаем название населенного пункта
            const locationName = await getLocationName(userLatitude, userLongitude);
            locationNameElement.textContent = locationName;
            
            // Получаем данные о погоде
            const { hourly } = weatherData;
            const now = new Date();
            
            // Находим индекс текущего часа в данных
            currentTimeIndex = hourly.time.findIndex(time => {
                const timeDate = new Date(time);
                return timeDate.getHours() === now.getHours() && 
                       timeDate.getDate() === now.getDate();
            });
            
            if (currentTimeIndex === -1) {
                showError('Не удалось найти текущие данные о погоде');
                return;
            }
            
            // Отображаем текущую температуру
            const currentTemp = hourly.temperature_2m[currentTimeIndex];
            currentTempElement.textContent = `${currentTemp}°C`;
            
            // Определяем описание погоды
            let weatherDescription = "Ясно";
            if (hourly.rain && hourly.rain[currentTimeIndex] > 0) {
                weatherDescription = "Дождь";
            } else if (hourly.showers && hourly.showers[currentTimeIndex] > 0) {
                weatherDescription = "Ливень";
            } else if (hourly.precipitation_probability[currentTimeIndex] > 70) {
                weatherDescription = "Облачно";
            }
            currentDescElement.textContent = weatherDescription;
            
            // Получаем вероятность осадков в ближайший час
            const nextHourPrecipitation = hourly.precipitation_probability[currentTimeIndex];
            precipitationValueElement.textContent = `${nextHourPrecipitation}%`;
            
            // Описание осадков на основе вероятности
            let precipitationDesc = '';
            if (nextHourPrecipitation === 0) {
                precipitationDesc = 'Осадков не ожидается';
            } else if (nextHourPrecipitation < 30) {
                precipitationDesc = 'Небольшая вероятность осадков';
            } else if (nextHourPrecipitation < 60) {
                precipitationDesc = 'Возможны осадки';
            } else if (nextHourPrecipitation < 80) {
                precipitationDesc = 'Вероятны осадки';
            } else {
                precipitationDesc = 'Высокая вероятность осадков';
            }
            precipitationDescElement.textContent = precipitationDesc;
            
            // Подготавливаем данные для графика
            const startIndex = Math.max(0, currentTimeIndex - 10);
            const endIndex = Math.min(hourly.time.length - 1, currentTimeIndex + 10);
            
            const chartTimes = hourly.time.slice(startIndex, endIndex + 1);
            const chartTemperatures = hourly.temperature_2m.slice(startIndex, endIndex + 1);
            
            // Форматируем время для отображения на графике
            const formattedTimes = chartTimes.map(time => {
                const date = new Date(time);
                return date.toLocaleTimeString('ru-RU', { 
                    hour: '2-digit', 
                    minute: '2-digit'
                });
            });
            
            // Создаем специальный массив точек для выделения текущего времени
            const currentPointIndex = currentTimeIndex - startIndex;
            const pointBackgroundColors = Array(chartTemperatures.length).fill('rgba(255, 255, 255, 0.6)');
            const pointBorderColors = Array(chartTemperatures.length).fill('rgba(0, 0, 0, 0.5)');
            const pointRadiuses = Array(chartTemperatures.length).fill(2);
            const pointHoverRadiuses = Array(chartTemperatures.length).fill(4);
            
            // Выделяем точку текущего времени
            if (currentPointIndex >= 0 && currentPointIndex < pointBackgroundColors.length) {
                pointBackgroundColors[currentPointIndex] = 'rgba(255, 99, 132, 1)';
                pointBorderColors[currentPointIndex] = 'rgba(255, 255, 255, 1)';
                pointRadiuses[currentPointIndex] = 6;
                pointHoverRadiuses[currentPointIndex] = 8;
            }
            
            // Создаем или обновляем график
            const ctx = document.getElementById('temperature-chart').getContext('2d');
            
            if (temperatureChart) {
                temperatureChart.destroy();
            }
            
            temperatureChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: formattedTimes,
                    datasets: [{
                        label: 'Температура (°C)',
                        data: chartTemperatures,
                        borderColor: 'rgba(255, 255, 255, 0.8)',
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: pointBackgroundColors,
                        pointBorderColor: pointBorderColors,
                        pointRadius: pointRadiuses,
                        pointHoverRadius: pointHoverRadiuses
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'white',
                                maxTicksLimit: 5,
                                font: {
                                    size: 10
                                }
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'white',
                                maxTicksLimit: 8,
                                font: {
                                    size: 9
                                },
                                callback: function(value, index, values) {
                                    return index % 2 === 0 ? this.getLabelForValue(value) : '';
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.7)',
                            titleColor: 'white',
                            bodyColor: 'white',
                            titleFont: {
                                size: 11
                            },
                            bodyFont: {
                                size: 11
                            },
                            callbacks: {
                                label: function(context) {
                                    const index = context.dataIndex;
                                    const timeIndex = startIndex + index;
                                    let label = `Температура: ${context.parsed.y}°C`;
                                    if (timeIndex === currentTimeIndex) {
                                        label += ' (Сейчас)';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    layout: {
                        padding: {
                            top: 3,
                            bottom: 3,
                            left: 5,
                            right: 5
                        }
                    }
                }
            });
            
            // Обновляем время последнего обновления
            const updateTime = new Date();
            lastUpdatedElement.textContent = `Обновлено: ${updateTime.toLocaleTimeString('ru-RU')}`;
            
            // Показываем данные о погоде
            loadingElement.style.display = 'none';
            weatherDataElement.style.display = 'grid';
        }
        
        // Функция для обновления данных
        async function updateWeatherData() {
            try {
                // При обновлении используем кешированные данные, если доступны
                const location = await getUserLocation(true);
                
                userLatitude = location.latitude;
                userLongitude = location.longitude;
                locationAccuracy = location.accuracy;
                
                const weatherData = await fetchWeatherData(userLatitude, userLongitude);
                await displayWeatherData(weatherData);
                
            } catch (error) {
                console.error('Ошибка при обновлении данных:', error);
            }
        }
        
        // Основная функция инициализации
        async function initWeatherApp() {
            try {
                // Получаем местоположение пользователя (с использованием кеша)
                const location = await getUserLocation(true);
                
                userLatitude = location.latitude;
                userLongitude = location.longitude;
                locationAccuracy = location.accuracy;
                
                // Получаем данные о погоде
                const weatherData = await fetchWeatherData(userLatitude, userLongitude);
                
                // Отображаем данные о погоде
                await displayWeatherData(weatherData);
                
                // Запускаем автообновление каждые 10 минут
                refreshInterval = setInterval(updateWeatherData, 10 * 60 * 1000);
                
                // Показываем информацию о следующем обновлении
                const nextUpdate = new Date(Date.now() + 10 * 60 * 1000);
                refreshInfoElement.textContent = `Автообновление каждые 10 минут. Следующее: ${nextUpdate.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'})}`;
                
            } catch (error) {
                showError(error.message);
            }
        }
        
        // Запускаем приложение при загрузке страницы
        document.addEventListener('DOMContentLoaded', initWeatherApp);
        
        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            if (temperatureChart) {
                temperatureChart.resize();
            }
        });
        
        // Обработка события видимости страницы
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                // Страница снова стала активной, обновляем данные
                updateWeatherData();
            }
        });
    </script>
</body>
</html>
