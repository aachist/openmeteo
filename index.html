<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода по геолокации</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Погода в вашем районе</h2>
        <p id="location" class="loading">Определение местоположения...</p>
        <div id="weather-info">
            <p id="temperature">-- °C</p>
            <p id="description">Ожидание данных...</p>
        </div>
        <div id="error-block" class="error-message"></div>
    </div>

    <script>
        // ВСТАВЬТЕ СЮДА ВАШ КЛЮЧ ИЗ ЛИЧНОГО КАБИНЕТА VISUAL CROSSING
        const VISUAL_CROSSING_KEY = 'H8KTJB7C5F7YBMH5UT7U84RE6'; 

        // Инициализация при загрузке страницы
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(successPosition, errorPosition, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            } else {
                showError("Ваш браузер не поддерживает определение местоположения.");
            }
        };

        // Обработка успешного получения координат GPS
        async function successPosition(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            // 1. Получаем понятное название города/района
            const locationName = await getLocationName(latitude, longitude);
            document.getElementById('location').innerText = locationName;
            document.getElementById('location').classList.remove('loading');

            // 2. Получаем погоду через новый стабильный сервис
            await getWeather(latitude, longitude);
        }

        // Ошибка самого GPS на телефоне
        function errorPosition(error) {
            document.getElementById('location').classList.remove('loading');
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    showError("Доступ к геолокации запрещен. Пожалуйста, разрешите доступ в настройках телефона/браузера.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    showError("Не удалось определить координаты. Проверьте, включен ли GPS.");
                    break;
                case error.TIMEOUT:
                    showError("Время ожидания координат истекло. Попробуйте обновить страницу.");
                    break;
                default:
                    showError("Произошла неизвестная ошибка при определении локации.");
            }
        }

        // Запрос названия места (Исправлены кавычки, добавлен Email и User-Agent)
        async function getLocationName(latitude, longitude) {
            try {
                const url = `https://openstreetmap.org{latitude}&lon=${longitude}&zoom=10&addressdetails=1&email=aachist@gmail.com`;
                
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'WeatherApp_aachist',
                        'Accept-Language': 'ru-RU, ru;q=0.9,en;q=0.8'
                    }
                });

                if (!response.ok) {
                    throw new Error('Не удалось связаться с сервером имён.');
                }

                const data = await response.json();
                let locationName = 'Неизвестное местоположение';

                if (data.address) {
                    if (data.address.city) locationName = data.address.city;
                    else if (data.address.town) locationName = data.address.town;
                    else if (data.address.village) locationName = data.address.village;
                    else if (data.address.suburb) locationName = data.address.suburb;
                    else if (data.address.county) locationName = data.address.county;
                    else if (data.address.state) locationName = data.address.state;
                    else if (data.address.country) locationName = data.address.country;
                }
                return locationName;

            } catch (error) {
                console.error('Ошибка Nominatim:', error);
                return 'Ваш район (город)';
            }
        }

        // Запрос погоды через Visual Crossing (Работает без VPN!)
        async function getWeather(latitude, longitude) {
            try {
                if (VISUAL_CROSSING_KEY === 'ВАШ_КЛЮЧ_VISUAL_CROSSING') {
                    throw new Error("Необходимо указать настоящий API-ключ в коде скрипта.");
                }

                // Запрос к Visual Crossing API с флагом метрической системы (Celsius) и языком (ru)
            const url = `https://visualcrossing.com{latitude},${longitude}?unitGroup=metric&key=${VISUAL_CROSSING_KEY}&contentType=json&lang=ru`;



                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        throw new Error("Неверный ключ API Visual Crossing. Проверьте его в коде.");
                    }
                    throw new Error(`Ошибка сервера погоды: Статус ${response.status}`);
                }

                const data = await response.json();
                
                // Выводим данные текущей погоды на экран
                const currentConditions = data.currentConditions;
                document.getElementById('temperature').innerText = `${Math.round(currentConditions.temp)} °C`;
                document.getElementById('description').innerText = currentConditions.conditions;
                
                // Скрываем блок ошибки, если данные успешно получены
                document.getElementById('error-block').style.display = 'none';

            } catch (error) {
                console.error('Ошибка получения погоды:', error);
                showError(`Не удалось получить данные о погоде: ${error.message}`);
            }
        }

        // Функция красивого вывода ошибок на экран
        function showError(message) {
            const errorBlock = document.getElementById('error-block');
            errorBlock.innerText = message;
            errorBlock.style.display = 'block';
            
            // Сбрасываем интерфейс в дефолтное состояние
            document.getElementById('temperature').innerText = "-- °C";
            document.getElementById('description').innerText = "Ошибка загрузки";
        }
    </script>
</body>
</html>
